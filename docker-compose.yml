services:
  term-agent:
    build: .
    image: ghcr.io/noxgle/term_agent:latest
    container_name: term-agent-container
    ports:
      - "2222:22"  # Map SSH port to host port 2222 to avoid conflicts
      - "${API_PORT:-8000}:8000"  # API port
    volumes:
      - ./.env:/app/.env:ro  # Mount .env file read-only
      - ./logs:/app/logs  # Volume for logs
    environment:
      - TZ=Europe/Warsaw  # Set timezone
      - API_ENABLE=${API_ENABLE:-true}
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=${API_PORT:-8000}
      - API_SERVER_KEY=${API_SERVER_KEY:-}
      - API_MAX_WORKERS=${API_MAX_WORKERS:-4}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/22'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  logs:
